server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the backend container on the shared network
    # "backend" = the service name in the backend's docker-compose.yml
    location /api/ {
        proxy_pass         http://packify:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }
}
