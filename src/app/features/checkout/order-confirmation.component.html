<main class="page-wrapper">
  <div class="container" style="padding-top: var(--space-32); text-align: center; min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <div class="confirmation__icon">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="19" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 20l5.5 5.5L28 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p class="eyebrow" style="margin-top: var(--space-6); margin-bottom: var(--space-3)">Order confirmed</p>
    <h1 class="display-md" style="margin-bottom: var(--space-4)">Thank you for your order.</h1>
    <p class="body-base text-muted" style="margin-bottom: var(--space-2)">Order {{ orderId }}</p>
    <p class="body-base text-muted" style="max-width: 420px; margin-bottom: var(--space-10)">
      You'll receive a confirmation email shortly. Your VOYÆ luggage is being carefully prepared for dispatch.
    </p>
    <div style="display: flex; gap: var(--space-4); flex-wrap: wrap; justify-content: center;">
      <a routerLink="/account" class="btn btn--primary">Track your order</a>
      <a routerLink="/shop" class="btn btn--ghost">Continue shopping</a>
    </div>
  </div>
</main>
