<footer class="footer">
  <div class="footer__top container">
    <div class="footer__brand">
      <span class="footer__logo">VOY&#198;</span>
      <p class="footer__tagline body-sm text-muted">
        Suitcases engineered for the journey.<br>Built to last ten years — and the next.
      </p>
      <div class="footer__newsletter">
        <input
          type="email"
          class="form-control footer__email"
          placeholder="Your email address"
          [(ngModel)]="email" />
        <button class="btn btn--terra" (click)="subscribe()">Join</button>
      </div>
    </div>

    <nav class="footer__links" aria-label="Footer navigation">
      <div class="footer__col">
        <h3 class="footer__col-title">Shop</h3>
        <a routerLink="/shop" [queryParams]="{size:'carry-on'}" class="footer__link">Carry-On</a>
        <a routerLink="/shop" [queryParams]="{size:'check-in'}" class="footer__link">Check-In</a>
        <a routerLink="/shop" [queryParams]="{size:'large'}"    class="footer__link">Large</a>
        <a routerLink="/shop" class="footer__link">Accessories</a>
      </div>
      <div class="footer__col">
        <h3 class="footer__col-title">Company</h3>
        <a routerLink="/about"          class="footer__link">About</a>
        <a routerLink="/journal"        class="footer__link">Journal</a>
        <a routerLink="/sustainability" class="footer__link">Sustainability</a>
        <a routerLink="/careers"        class="footer__link">Careers</a>
      </div>
      <div class="footer__col">
        <h3 class="footer__col-title">Support</h3>
        <a routerLink="/faq"      class="footer__link">FAQ</a>
        <a routerLink="/warranty" class="footer__link">Warranty</a>
        <a routerLink="/returns"  class="footer__link">Returns</a>
        <a routerLink="/contact"  class="footer__link">Contact</a>
      </div>
    </nav>
  </div>

  <div class="footer__bottom container">
    <p class="footer__legal">© 2025 VOYÆ. All rights reserved.</p>
    <div class="footer__social">
      <a href="#" aria-label="Instagram" class="footer__social-link">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="2" width="14" height="14" rx="4" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="9" cy="9" r="3" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="13" cy="5" r="1" fill="currentColor"/>
        </svg>
      </a>
      <a href="#" aria-label="X (Twitter)" class="footer__social-link">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 3l5.2 6L3 15h1.5l4.4-5.1L13 15h3L10.7 8.8 16 3h-1.5L9.9 7.7 6 3H3z" fill="currentColor"/>
        </svg>
      </a>
      <a href="#" aria-label="Facebook" class="footer__social-link">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M10 3h2V1H10a4 4 0 00-4 4v2H4v2h2v7h2V9h2l.5-2H8V5a2 2 0 012-2z" fill="currentColor"/>
        </svg>
      </a>
    </div>
  </div>
</footer>
