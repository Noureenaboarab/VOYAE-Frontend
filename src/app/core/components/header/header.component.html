<header class="header" [class.header--scrolled]="isScrolled">
  <div class="header__inner">
    <!-- Hamburger (mobile) -->
    <button
      class="header__menu-btn"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Open navigation"
      (click)="menuOpen.set(!menuOpen())">
      <span class="header__hamburger" [class.is-open]="menuOpen()"></span>
    </button>

    <!-- Logo -->
    <a routerLink="/" class="header__logo" aria-label="VOYÆ – home">
      VOY&#198;
    </a>

    <!-- Primary nav -->
    <nav class="header__nav" aria-label="Primary navigation">
      <a routerLink="/shop"        routerLinkActive="is-active" class="header__nav-link">Shop</a>
      <a routerLink="/collections" routerLinkActive="is-active" class="header__nav-link">Collections</a>
      <a routerLink="/about"       routerLinkActive="is-active" class="header__nav-link">About</a>
      <a routerLink="/journal"     routerLinkActive="is-active" class="header__nav-link">Journal</a>
    </nav>

    <!-- Actions -->
    <div class="header__actions">
      <!-- Search -->
      <button
        class="header__icon-btn"
        aria-label="Search"
        [attr.aria-expanded]="searchService.isOpen()"
        (click)="openSearch()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12.5 12.5L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Account -->
      <a routerLink="/account" class="header__icon-btn" aria-label="My account">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="6" r="3.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M2 17c0-4 3.134-6 7-6s7 2 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </a>

      <!-- Cart -->
      <a routerLink="/cart" class="header__icon-btn header__cart-btn" aria-label="Shopping bag">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="6" width="14" height="11" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6 6V5a3 3 0 016 0v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        @if (cartCount() > 0) {
          <span class="header__cart-badge">{{ cartCount() }}</span>
        }
      </a>
    </div>
  </div>

  <!-- Mobile nav drawer -->
  @if (menuOpen()) {
    <nav class="header__mobile-nav" aria-label="Mobile navigation">
      <a routerLink="/shop"        (click)="menuOpen.set(false)" class="header__mobile-link">Shop</a>
      <a routerLink="/collections" (click)="menuOpen.set(false)" class="header__mobile-link">Collections</a>
      <a routerLink="/about"       (click)="menuOpen.set(false)" class="header__mobile-link">About</a>
      <a routerLink="/journal"     (click)="menuOpen.set(false)" class="header__mobile-link">Journal</a>
      <a routerLink="/account"     (click)="menuOpen.set(false)" class="header__mobile-link">Account</a>
    </nav>
  }
</header>
